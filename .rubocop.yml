plugins:
  - rubocop-rails
AllCops:
  NewCops: enable

Style/Documentation:
  Enabled: false

Rails/LexicallyScopedActionFilter:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - 'app/admin/**'
    - 'config/environments/**'
    - 'lib/tasks/**'

Layout/LineLength:
  Exclude:
    - 'app/models/**'

Metrics/MethodLength:
  Exclude:
    - 'db/migrate/**'

Metrics/AbcSize:
  Exclude:
    - 'db/migrate/**'
    - 'app/models/**'
